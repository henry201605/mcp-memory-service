# ============================================================
# MCP 全组件一键部署脚本（V4.0）
# 适配方案：MCP + Jenkins + ArgoCD + K8s
# 运行时：containerd（非 Docker，需特殊处理部分镜像的容器检测逻辑）
# 命名空间：mcp-system（所有 MCP 组件统一部署）
# 端口范围：9527-9535（便于运维统一开通）
#
# 前置条件：
#   1. 构建自定义镜像（见 scripts/build-mcp-images.sh）
#   2. DNS 解析配置（见 Ingress 部分注释）
#
# 执行命令：kubectl apply -f mcp-all-in-one.yaml
# 卸载命令：kubectl delete -f mcp-all-in-one.yaml
# ============================================================

---
# ==================== 1. 命名空间 ====================
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-system
  labels:
    name: mcp-system
    type: mcp-platform

---
# ==================== 2. K8s MCP 权限配置 ====================
# 集群只读权限，含 ArgoCD Application 监听权限
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-mcp-sa
  namespace: mcp-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-k8s-reader
rules:
  # 核心资源只读
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "events", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch"]
  # 工作负载只读
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list", "watch"]
  # ArgoCD Application 只读（用于监听部署同步状态）
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-k8s-binding
subjects:
  - kind: ServiceAccount
    name: k8s-mcp-sa
    namespace: mcp-system
roleRef:
  kind: ClusterRole
  name: mcp-k8s-reader
  apiGroup: rbac.authorization.k8s.io

---
# ==================== 3. HTTP Proxy MCP（端口 9528） ====================
# 统一代理访问集群内所有服务，无需端口转发
apiVersion: v1
kind: ConfigMap
metadata:
  name: http-proxy-conf
  namespace: mcp-system
data:
  default.conf: |
    server {
      listen 9528;

      # 健康检查端点（kube-probe 不带 X-Target-Url，必须单独处理）
      location = /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      }

      location / {
        # 安全限制：未携带合法 X-Target-Url 的请求直接拒绝
        if ($http_x_target_url = '') {
          return 403;
        }
        if ($http_x_target_url !~* ^http://.*\..*:.*$) {
          return 403;
        }

        # 通过 X-Target-Url 请求头指定目标服务地址
        proxy_pass $http_x_target_url;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: http-proxy-mcp
  namespace: mcp-system
  labels:
    app: http-proxy-mcp
    component: mcp-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: http-proxy-mcp
  template:
    metadata:
      labels:
        app: http-proxy-mcp
    spec:
      containers:
        - name: proxy
          image: unipus.tencentcloudcr.com/unipus/mcp/nginx:latest
          ports:
            - containerPort: 9528
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9528
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 9528
            initialDelaySeconds: 3
            periodSeconds: 5
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: conf
          configMap:
            name: http-proxy-conf

---
apiVersion: v1
kind: Service
metadata:
  name: http-proxy-mcp
  namespace: mcp-system
spec:
  type: NodePort
  ports:
    - port: 9528
      targetPort: 9528
      nodePort: 30528
      protocol: TCP
  selector:
    app: http-proxy-mcp

---
# ==================== 4. K8s MCP（端口 9535） ====================
# 部署校验、故障排查、ArgoCD 状态查询
# 基础镜像：ghcr.io/alexei-led/k8s-mcp-server v1.4.2
# 自定义镜像：k8s-mcp:v2（无修改，仅推送到私有仓库）
#
# 已知问题及解决方案：
#   1. 镜像通过 is_docker_environment() 检测 /.dockerenv 决定绑定地址
#      containerd 运行时无此文件 → 默认绑定 127.0.0.1 → 探针失败
#      解决：通过 command monkey-patch 强制 is_docker_environment() 返回 True
#   2. 镜像无 /health 端点 → 探针改为 TCP Socket
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-mcp
  namespace: mcp-system
  labels:
    app: k8s-mcp
    component: mcp-platform
spec:
  # streamable-http 需要会话粘性，单副本避免 session 路由问题
  replicas: 1
  selector:
    matchLabels:
      app: k8s-mcp
  template:
    metadata:
      labels:
        app: k8s-mcp
    spec:
      serviceAccountName: k8s-mcp-sa
      containers:
        - name: k8s-mcp
          image: unipus.tencentcloudcr.com/unipus/mcp/k8s-mcp:v2
          # [containerd 适配] 强制 is_docker_environment() 返回 True，使服务绑定 0.0.0.0
          command: ["python", "-c", "import k8s_mcp_server.config; k8s_mcp_server.config.is_docker_environment = lambda: True; from k8s_mcp_server.__main__ import main; main()"]
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: K8S_MCP_TRANSPORT
              value: "streamable-http"
            - name: K8S_MCP_SECURITY_MODE
              value: "strict"
            - name: K8S_MCP_TIMEOUT
              value: "30"
            - name: K8S_MCP_ALLOWED_HOSTS
              value: "k8s-mcp.unipus.cn,localhost,0.0.0.0"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: k8s-mcp
  namespace: mcp-system
spec:
  type: NodePort
  ports:
    - port: 9535
      targetPort: 8000
      nodePort: 30535
      protocol: TCP
  selector:
    app: k8s-mcp

---
# ==================== 5. Memory MCP（端口 9527） ====================
# 故障记忆、历史问题匹配、部署版本沉淀
# 基础镜像：doobidoo/mcp-memory-service:latest（doobidoo 主线，SQLite-vec + ONNX）
# 自定义镜像：memory-mcp:v4（预装 all-MiniLM-L6-v2 embedding 模型）
#
# 迁移说明（v3 → v4）：
#   从 27b-io fork（Qdrant 后端）切换到 doobidoo 主线（SQLite-vec 后端）
#   原因：27b-io 的 qdrant_storage.py 使用 prompt_name="passage" 调用 embedding，
#         但 e5-small-v2 模型只支持 "query"/"document"，导致 store_memory 100% 失败
#   doobidoo 主线社区活跃（725+ stars）、测试覆盖 1537 tests、版本迭代稳定
#
# 架构变更：
#   v3: Qdrant 嵌入式向量库 + e5-small-v2 (384d) + FalkorDB 知识图谱
#   v4: SQLite-vec 向量库 + all-MiniLM-L6-v2 (384d) + 内置 SQLite 图谱
#
# 已知问题及解决方案：
#   1. 存储后端为 SQLite-vec，单文件数据库，必须挂载 PVC 持久化
#      数据路径：/app/sqlite_db（镜像内置 VOLUME）
#      备份路径：/app/backups
#   2. 入口点为 docker-entrypoint-unified.sh，通过 MCP_MODE 环境变量切换模式
#      MCP_MODE=streamable-http → Streamable HTTP 传输（Kiro/Claude.ai 远程连接）
#      MCP_MODE=http → REST API + Web Dashboard（浏览器管理界面）
#      MCP_MODE=mcp → stdio 传输（Claude Desktop 本地连接）
#   3. Streamable HTTP 模式监听端口由 MCP_SSE_PORT 控制（默认 8765）
#      这里改为 8000 保持与 v3 端口一致，Ingress/Service 配置无需变更
#      必须设 MCP_SSE_HOST=0.0.0.0，否则只监听 127.0.0.1，K8s 探针失败
#   4. 首次启动需下载 embedding 模型（~90MB），建议构建镜像时预下载
#      通过 hf-mirror.com 国内镜像加速，缓存在 /root/.cache/huggingface
#   5. MCP_ALLOW_ANONYMOUS_ACCESS=true 跳过 OAuth，由 Ingress 层做认证
#
# 构建自定义镜像（Dockerfile.memory-mcp）：
#   FROM doobidoo/mcp-memory-service:latest
#   ENV HF_ENDPOINT=https://hf-mirror.com
#   RUN python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
#   ENV HF_ENDPOINT=
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-mcp
  namespace: mcp-system
  labels:
    app: memory-mcp
    component: mcp-platform
spec:
  replicas: 1  # 单副本，SQLite-vec 单文件数据库不支持多写
  selector:
    matchLabels:
      app: memory-mcp
  template:
    metadata:
      labels:
        app: memory-mcp
    spec:
      containers:
        - name: memory
          image: unipus.tencentcloudcr.com/unipus/mcp/memory-mcp:v4
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MCP_MODE
              value: "streamable-http"
            - name: MCP_SSE_HOST
              value: "0.0.0.0"
            - name: MCP_SSE_PORT
              value: "8000"
            - name: MCP_MEMORY_STORAGE_BACKEND
              value: "sqlite_vec"
            - name: MCP_MEMORY_SQLITE_PATH
              value: "/app/data/memory.db"
            - name: MCP_MEMORY_BACKUPS_PATH
              value: "/app/data/backups"
            - name: MCP_ALLOW_ANONYMOUS_ACCESS
              value: "true"
            - name: LOG_LEVEL
              value: "INFO"
            - name: PYTHONUNBUFFERED
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 60
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: memory-mcp-pvc

---
# Memory MCP 持久化存储
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-mcp-pvc
  namespace: mcp-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: memory-mcp
  namespace: mcp-system
spec:
  type: NodePort
  ports:
    - port: 9527
      targetPort: 8000
      nodePort: 30527
      protocol: TCP
  selector:
    app: memory-mcp

---
# ==================== 6. RepoMix MCP（端口 9531） ====================
# 代码整仓分析、依赖梳理、代码规范检查
# repomix 仅支持 stdio 模式，通过 supergateway 转为 SSE HTTP 服务
#
# 已知问题及解决方案：
#   1. npx supergateway + npx repomix 两个 Node 进程内存开销大
#      解决：内存限制从 256Mi 调至 512Mi
apiVersion: apps/v1
kind: Deployment
metadata:
  name: repomix-mcp
  namespace: mcp-system
  labels:
    app: repomix-mcp
    component: mcp-platform
spec:
  replicas: 1  # SSE 需要会话粘性，单副本避免 session 路由问题
  selector:
    matchLabels:
      app: repomix-mcp
  template:
    metadata:
      labels:
        app: repomix-mcp
    spec:
      containers:
        - name: repomix
          image: unipus.tencentcloudcr.com/unipus/mcp/repomix-mcp:latest
          command: ["npx"]
          args:
            - "-y"
            - "supergateway"
            - "--stdio"
            - "npx repomix --mcp"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: repomix-mcp
  namespace: mcp-system
spec:
  type: NodePort
  ports:
    - port: 9531
      targetPort: 8000
      nodePort: 30531
      protocol: TCP
  selector:
    app: repomix-mcp

---
# ==================== 7. Semgrep MCP（端口 9532） ====================
# 代码安全扫描（本地 Commit 后、Push 前触发）
# 基础镜像：ghcr.io/semgrep/mcp:latest（官方镜像）
# 自定义镜像：semgrep-mcp:v2（设置 FASTMCP_HOST=0.0.0.0）
#
# 已知问题及解决方案：
#   1. 旧版 semgrep-mcp 0.4.1 与 mcp SDK 1.23.3 不兼容
#      （FastMCP.__init__() 不支持 version 参数）
#      解决：使用官方新镜像 ghcr.io/semgrep/mcp，semgrep-mcp 已合入 semgrep 主包
#   2. 官方镜像默认 SSE 模式，需通过 args 切换为 streamable-http
#   3. 默认绑定 127.0.0.1，需通过 FASTMCP_HOST 环境变量改为 0.0.0.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: semgrep-mcp
  namespace: mcp-system
  labels:
    app: semgrep-mcp
    component: mcp-platform
spec:
  replicas: 1  # streamable-http 需要会话粘性，单副本避免 session 路由问题
  selector:
    matchLabels:
      app: semgrep-mcp
  template:
    metadata:
      labels:
        app: semgrep-mcp
    spec:
      containers:
        - name: semgrep
          image: unipus.tencentcloudcr.com/unipus/mcp/semgrep-mcp:v2
          args: ["-t", "streamable-http"]
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: FASTMCP_HOST
              value: "0.0.0.0"
            - name: FASTMCP_PORT
              value: "8000"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 300m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: semgrep-mcp
  namespace: mcp-system
spec:
  type: NodePort
  ports:
    - port: 9532
      targetPort: 8000
      nodePort: 30532
      protocol: TCP
  selector:
    app: semgrep-mcp

# ==================== 8. Lark MCP ====================
# Lark MCP 不需要独立部署到 K8s。飞书通知通过以下方式实现：
#   - Jenkins 构建通知：Jenkinsfile post 块 → 飞书 Webhook
#   - ArgoCD 部署通知：ArgoCD Notifications → 飞书 Webhook
#   - 需求拉取/复盘文档：IDE 内置 Lark MCP（Kiro/Cursor/Claude Desktop 等均支持）

---
# ==================== 9. Ingress（统一入口） ====================
# 每个 MCP 服务使用独立子域名，与现有 Ingress 风格一致
# 使用 traefik-test IngressClass，CLB 地址 10.60.0.187
# DNS 需解析以下域名到 10.60.0.187：
#   k8s-mcp.unipus.cn      → K8s MCP
#   proxy-mcp.unipus.cn    → HTTP Proxy MCP
#   memory-mcp.unipus.cn   → Memory MCP
#   repomix-mcp.unipus.cn  → RepoMix MCP
#   semgrep-mcp.unipus.cn  → Semgrep MCP
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ing-mcp
  namespace: mcp-system
  annotations:
    kubernetes.io/ingress.class: traefik-test
    traefik.ingress.kubernetes.io/router.priority: "10"
spec:
  ingressClassName: traefik-test
  rules:
    - host: k8s-mcp.unipus.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-mcp
                port:
                  number: 9535
    - host: proxy-mcp.unipus.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: http-proxy-mcp
                port:
                  number: 9528
    - host: memory-mcp.unipus.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memory-mcp
                port:
                  number: 9527
    - host: repomix-mcp.unipus.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: repomix-mcp
                port:
                  number: 9531
    - host: semgrep-mcp.unipus.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: semgrep-mcp
                port:
                  number: 9532
